version: 2

models:
  - name: stg_weather__daily
    description: "Cleaned daily weather data for 5 UK cities from Open-Meteo API"
    tests:
      - dbt_expectations.expect_table_row_count_to_be_between:
          min_value: 400
          max_value: 600
    columns:
      - name: city_name
        description: "Name of the UK city"
        tests:
          - not_null
          - accepted_values:
              values: ['London', 'Manchester', 'Birmingham', 'Edinburgh', 'Cardiff']
      - name: date
        description: "Date of the weather observation"
        tests:
          - not_null
      - name: temp_max
        description: "Maximum temperature in Celsius"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -20
              max_value: 45
      - name: temp_min
        description: "Minimum temperature in Celsius"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -20
              max_value: 45
      - name: precipitation_mm
        description: "Total precipitation in mm"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 200
      - name: windspeed_max_kmh
        description: "Maximum wind speed in km/h"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 200